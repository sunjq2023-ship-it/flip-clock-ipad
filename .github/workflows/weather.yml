name: Update Shanghai Weather

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch weather data
        run: |
          curl -s "https://api.open-meteo.com/v1/forecast?latitude=31.23&longitude=121.47&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m&timezone=Asia/Shanghai" -o weather_raw.json

      - name: Add timestamp and create weather.json
        run: |
          python3 -c "
          import json
          import time
          with open('weather_raw.json', 'r') as f:
              data = json.load(f)
          data['timestamp'] = int(time.time() * 1000)
          with open('weather.json', 'w') as f:
              json.dump(data, f, ensure_ascii=False)
          "

      - name: Commit weather.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weather.json
          git diff --staged --quiet weather.json || git commit -m "Auto-update weather data"
          git push
