<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="format-detection" content="telephone=no">
<title>翻页时钟</title>
<style>
/* ===== 全局重置 ===== */
* {
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
    -webkit-user-select: none;
    user-select: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    background: -webkit-radial-gradient(center, ellipse, #1a1a1a 0%, #0a0a0a 50%, #000 100%);
    background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 50%, #000 100%);
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

/* ===== 主容器 ===== */
#app {
    width: 100%;
    height: 100%;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-box-pack: center;
    -webkit-box-align: center;
    display: -webkit-flex;
    -webkit-flex-direction: column;
    -webkit-justify-content: center;
    -webkit-align-items: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* ===== 天气区域（移到顶部） ===== */
#weather {
    margin-bottom: 30px;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-box-pack: center;
    -webkit-box-align: center;
    display: -webkit-flex;
    -webkit-flex-direction: column;
    -webkit-justify-content: center;
    -webkit-align-items: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 70px;
}

#weather.loading {
    opacity: 0.5;
}

#weather.error #weather-main,
#weather.error #weather-details {
    display: none;
}

#weather.error #weather-greeting {
    display: block;
}

#weather-greeting {
    display: none;
    color: #888;
    font-size: 26px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

#weather-main {
    display: -webkit-box;
    -webkit-box-orient: horizontal;
    -webkit-box-align: center;
    display: -webkit-flex;
    -webkit-align-items: center;
    display: flex;
    align-items: center;
    margin-bottom: 8px;
}

#weather-icon {
    font-size: 56px;
    margin-right: 18px;
    line-height: 1;
}

#weather-temp {
    font-size: 42px;
    font-weight: 300;
    color: #f5f0e8;
    margin-right: 18px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}

#weather-desc {
    font-size: 26px;
    color: #bbb;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

#weather-details {
    display: -webkit-box;
    -webkit-box-orient: horizontal;
    -webkit-box-align: center;
    -webkit-box-pack: center;
    display: -webkit-flex;
    -webkit-align-items: center;
    -webkit-justify-content: center;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #666;
    letter-spacing: 1px;
}

.weather-sep {
    color: #333;
    margin: 0 12px;
}

/* ===== 时钟区域 ===== */
#clock {
    display: -webkit-box;
    -webkit-box-orient: horizontal;
    -webkit-box-pack: center;
    -webkit-box-align: center;
    display: -webkit-flex;
    -webkit-justify-content: center;
    -webkit-align-items: center;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== 翻页数字单元 ===== */
.digit {
    position: relative;
    width: 150px;
    height: 225px;
    margin: 0 7px;
    font-size: 180px;
    font-weight: bold;
    line-height: 225px;
    -webkit-perspective: 600px;
    perspective: 600px;
}

.card {
    position: absolute;
    left: 0;
    width: 100%;
    height: 50%;
    overflow: hidden;
    background: #1a1a1a;
    background: -webkit-gradient(linear, left top, left bottom, from(#2a2a2a), to(#1a1a1a));
    background: -webkit-linear-gradient(top, #2a2a2a 0%, #222 40%, #1a1a1a 100%);
    background: linear-gradient(to bottom, #2a2a2a 0%, #222 40%, #1a1a1a 100%);
    -webkit-box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -2px 8px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -2px 8px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
}

.card.top {
    top: 0;
    -webkit-border-top-left-radius: 14px;
    -webkit-border-top-right-radius: 14px;
    border-top-left-radius: 14px;
    border-top-right-radius: 14px;
    border-bottom: 2px solid #000;
    -webkit-box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), inset 0 -4px 12px rgba(0,0,0,0.7), 0 4px 12px rgba(0,0,0,0.4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), inset 0 -4px 12px rgba(0,0,0,0.7), 0 4px 12px rgba(0,0,0,0.4);
}

.card.bottom {
    bottom: 0;
    -webkit-border-bottom-left-radius: 14px;
    -webkit-border-bottom-right-radius: 14px;
    border-bottom-left-radius: 14px;
    border-bottom-right-radius: 14px;
    border-top: 2px solid #000;
    -webkit-box-shadow: inset 0 -1px 0 rgba(255,255,255,0.05), inset 0 4px 12px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.4);
    box-shadow: inset 0 -1px 0 rgba(255,255,255,0.05), inset 0 4px 12px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.4);
}

.card .flip-text {
    position: absolute;
    left: 0;
    width: 100%;
    height: 225px;
    line-height: 225px;
    text-align: center;
    color: #f5f0e8;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5), 0 0 1px rgba(255,255,255,0.1);
}

.card.top .flip-text { top: 0; }
.card.bottom .flip-text { top: -112px; }

.flip {
    position: absolute;
    left: 0;
    width: 100%;
    height: 50%;
    overflow: hidden;
    background: #1a1a1a;
    background: -webkit-gradient(linear, left top, left bottom, from(#2a2a2a), to(#1a1a1a));
    background: -webkit-linear-gradient(top, #2a2a2a 0%, #222 40%, #1a1a1a 100%);
    background: linear-gradient(to bottom, #2a2a2a 0%, #222 40%, #1a1a1a 100%);
    -webkit-box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -2px 8px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -2px 8px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    display: none;
    z-index: 10;
}

.flip .flip-text {
    position: absolute;
    left: 0;
    width: 100%;
    height: 225px;
    line-height: 225px;
    text-align: center;
    color: #f5f0e8;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5), 0 0 1px rgba(255,255,255,0.1);
}

.flip.top-flip {
    top: 0;
    -webkit-border-top-left-radius: 14px;
    -webkit-border-top-right-radius: 14px;
    border-top-left-radius: 14px;
    border-top-right-radius: 14px;
    border-bottom: 2px solid #000;
    -webkit-transform-origin: bottom;
    transform-origin: bottom;
    -webkit-transform: rotateX(0deg);
    transform: rotateX(0deg);
}

.flip.top-flip .flip-text { top: 0; }

.flip.top-flip.animating {
    display: block;
    -webkit-animation: flipTopDown 0.3s ease-in forwards;
    animation: flipTopDown 0.3s ease-in forwards;
}

@-webkit-keyframes flipTopDown {
    0% { -webkit-transform: rotateX(0deg); }
    100% { -webkit-transform: rotateX(-90deg); }
}

@keyframes flipTopDown {
    0% { transform: rotateX(0deg); }
    100% { transform: rotateX(-90deg); }
}

.flip.bottom-flip {
    bottom: 0;
    -webkit-border-bottom-left-radius: 14px;
    -webkit-border-bottom-right-radius: 14px;
    border-bottom-left-radius: 14px;
    border-bottom-right-radius: 14px;
    border-top: 2px solid #000;
    -webkit-transform-origin: top;
    transform-origin: top;
    -webkit-transform: rotateX(90deg);
    transform: rotateX(90deg);
}

.flip.bottom-flip .flip-text { top: -112px; }

.flip.bottom-flip.animating {
    display: block;
    -webkit-animation: flipBottomUp 0.3s ease-out forwards;
    animation: flipBottomUp 0.3s ease-out forwards;
}

@-webkit-keyframes flipBottomUp {
    0% { -webkit-transform: rotateX(90deg); }
    100% { -webkit-transform: rotateX(0deg); }
}

@keyframes flipBottomUp {
    0% { transform: rotateX(90deg); }
    100% { transform: rotateX(0deg); }
}

/* ===== 冒号 ===== */
.colon {
    font-size: 150px;
    font-weight: bold;
    color: #f5f0e8;
    line-height: 225px;
    padding: 0 12px;
    -webkit-animation: blink 2s ease-in-out infinite;
    animation: blink 2s ease-in-out infinite;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

@-webkit-keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
}

/* ===== 日期 ===== */
#date {
    margin-top: 45px;
    font-size: 34px;
    color: #888;
    text-align: center;
    letter-spacing: 3px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

/* ===== 每日一句 ===== */
#quote {
    margin-top: 25px;
    font-family: "Kaiti SC", "STKaiti", "KaiTi", "楷体", serif;
    font-size: 28px;
    color: #c9a86a;
    text-align: center;
    letter-spacing: 2px;
    max-width: 90%;
    text-shadow: 0 0 8px rgba(201,168,106,0.3), 0 1px 2px rgba(0,0,0,0.5);
    line-height: 1.6;
}

/* ===== 响应式适配 ===== */
@media screen and (max-width: 768px) {
    .digit {
        width: 112px; height: 168px; font-size: 134px; line-height: 168px; margin: 0 4px;
    }
    .card .flip-text, .flip .flip-text { height: 168px; line-height: 168px; font-size: 134px; }
    .card.bottom .flip-text, .flip.bottom-flip .flip-text { top: -84px; }
    .colon { font-size: 112px; line-height: 168px; padding: 0 7px; }
    #date { font-size: 26px; margin-top: 35px; }
    #quote { font-size: 22px; margin-top: 20px; }
    #weather-icon { font-size: 44px; }
    #weather-temp { font-size: 34px; }
    #weather-desc { font-size: 22px; }
    #weather-details { font-size: 17px; }
    #weather-greeting { font-size: 22px; }
}

@media screen and (max-width: 480px) {
    .digit {
        width: 82px; height: 123px; font-size: 98px; line-height: 123px; margin: 0 3px;
    }
    .card .flip-text, .flip .flip-text { height: 123px; line-height: 123px; font-size: 98px; }
    .card.bottom .flip-text, .flip.bottom-flip .flip-text { top: -61px; }
    .colon { font-size: 82px; line-height: 123px; padding: 0 4px; }
    #date { font-size: 19px; margin-top: 28px; }
    #quote { font-size: 17px; margin-top: 15px; }
    #weather-icon { font-size: 34px; }
    #weather-temp { font-size: 26px; }
    #weather-desc { font-size: 18px; }
    #weather-details { font-size: 14px; }
    #weather-greeting { font-size: 18px; }
}
</style>
</head>
<body>

<div id="app">
    <div id="weather">
        <div id="weather-main">
            <div id="weather-icon"></div>
            <span id="weather-temp"></span>
            <span id="weather-desc"></span>
        </div>
        <div id="weather-details">
            <span id="weather-extra"></span>
        </div>
        <div id="weather-greeting"></div>
    </div>
    <div id="clock">
        <div class="digit" id="d0"></div>
        <div class="digit" id="d1"></div>
        <div class="colon">:</div>
        <div class="digit" id="d2"></div>
        <div class="digit" id="d3"></div>
    </div>
    <div id="date"></div>
    <div id="quote"></div>
</div>

<script>
(function() {
    "use strict";

    // ===== 每日一句（365天经典古诗） =====
    var QUOTES = [
        // 一月（31句）
        ["爆竹声中一岁除，春风送暖入屠苏。","千门万户曈曈日，总把新桃换旧符。","从今诸事愿，胜旧一新年。","寒随一夜去，春逐五更来。","律回岁晚冰霜少，春到人间草木知。","行到水穷处，坐看云起时。","晚来天欲雪，能饮一杯无。","孤舟蓑笠翁，独钓寒江雪。","柴门闻犬吠，风雪夜归人。","偷得浮生半日闲。","海内存知己，天涯若比邻。","明月松间照，清泉石上流。","采菊东篱下，悠然见南山。","浮云一别后，流水十年间。","静以修身，俭以养德。","不以物喜，不以己悲。","潮平两岸阔，风正一帆悬。","莫道前路无知己，天下谁人不识君。","宠辱不惊，闲看庭前花开花落。","世事短如春梦，人情薄似秋云。","心似白云常自在，意如流水任东西。","有约不来过夜半，闲敲棋子落灯花。","醉后不知天在水，满船清梦压星河。","人生到处知何似，应似飞鸿踏雪泥。","回首向来萧瑟处，归去，也无风雨也无晴。","一蓑烟雨任平生。","山重水复疑无路，柳暗花明又一村。","沉舟侧畔千帆过，病树前头万木春。","一元复始，万象更新。","岁岁年年常顺遂，平平安安度朝昏。","新岁安然，万事顺遂。"],
        // 二月（28句）
        ["沾衣欲湿杏花雨，吹面不寒杨柳风。","春到人间草木知。","天街小雨润如酥，草色遥看近却无。","乱花渐欲迷人眼，浅草才能没马蹄。","等闲识得东风面，万紫千红总是春。","春风又绿江南岸，明月何时照我还。","桃花一簇开无主，可爱深红爱浅红。","两个黄鹂鸣翠柳，一行白鹭上青天。","西塞山前白鹭飞，桃花流水鳜鱼肥。","春色恼人眠不得，月移花影上栏杆。","天街夜色凉如水，卧看牵牛织女星。","无可奈何花落去，似曾相识燕归来。","自在飞花轻似梦，无边丝雨细如愁。","小楼一夜听春雨，深巷明朝卖杏花。","春雨断桥人不度，小舟撑出柳阴来。","双飞燕子几时回，夹岸桃花蘸水开。","春风得意马蹄疾，一日看尽长安花。","草木知春不久归，百般红紫斗芳菲。","春心莫共花争发，一寸相思一寸灰。","春潮带雨晚来急，野渡无人舟自横。","风柔日薄春犹早，夹衫乍著心情好。","春色三分，二分尘土，一分流水。","春归万物生，岁岁皆安宁。","东风解冻，春信初生。","花开不语，春风自知。","人间二月，温柔生长。","且随春风，慢慢前行。","春归万物，喜乐如常。"],
        // 三月（31句）
        ["春风十里扬州路，卷上珠帘总不如。","等闲识得东风面，万紫千红总是春。","人面不知何处去，桃花依旧笑春风。","迟日江山丽，春风花草香。","桃花一簇开无主，可爱深红爱浅红。","春风十里，心安即是归处。","春有百花秋有月，夏有凉风冬有雪。","江畔何人初见月？江月何年初照人。","花开自有期，不必苦心急。","清风徐来，水波不兴。","草长莺飞二月天，拂堤杨柳醉春烟。","心栖春光里，不问世间沧桑。","沾衣欲湿杏花雨，吹面不寒杨柳风。","人间三月春光好，万般温柔入日常。","花开缓缓，度日悠悠。","春归山野静，心定万事平。","一花一世界，一叶一菩提。","春色撩人醉，心安万事柔。","春风能解意，烦恼自消融。","行于春风里，随性自安然。","细雨润千山，温柔渡日常。","花开由自性，不必向人逢。","春风得意，心境从容。","慢赏人间春色，闲品烟火流年。","乱花渐欲迷人眼，浅草才能没马蹄。","心随春风舒展，万事慢慢释怀。","春光作序，万事顺遂无忧。","年年逢春日，日日得舒心。","满园春色关不住，一枝红杏出墙来。","暮春光景温柔，日子平淡清宁。","春色满园，心绪安然。"],
        // 四月（30句）
        ["人间四月芳菲尽，山寺桃花始盛开。","晴日暖风，岁月从容自在。","槐序风轻，诸事温柔顺心。","人间四月芳菲尽，山寺桃花始盛开。","清风入怀，抛开俗世烦忧。","若无闲事挂心头，便是人间好时节。","浅夏初临，恬淡安然度日。","微风浅浅，心事淡淡安宁。","且听风吟，静待繁花自开。","绿树阴浓夏日长，楼台倒影入池塘。","日子清浅，自有人间清欢。","风来听风，雨来赏雨，得失随心。","一窗风月闲，半日浮生闲。","繁华落尽见真淳。","看淡凡尘琐事，静享四季清风。","气清风和，万事舒心顺遂。","删繁就简心清净，平淡度日亦安然。","阴晴皆是风景，得失不必萦怀。","清风绕檐角，心安即日常。","宠辱不惊，闲看庭前花开花落；去留无意，漫随天外云卷云舒。","四月安然，心绪平和自在。","小窗闲静坐，慢度闲散光阴。","寻常烟火味，淡淡小清欢。","心藏清宁意，浮沉自不惊。","晚风消烦忧，心绪渐温柔。","半生烟雨半生梦，半随流水半随风。","随性而行，不必匆匆赶路。","清风吹散尘俗虑，心静人间处处安。","暮春留余韵，浅夏启温柔。","四季流转匆匆，心安便是归途。"],
        // 五月（31句）
        ["梅子黄时日日晴，小溪泛尽却山行。","初夏风清，眉目舒展从容。","晚风轻轻起，心事渐渐轻。","晴光满街巷，日子明朗温柔。","一缕清风消暑气，万般俗事自舒心。","小荷才露尖尖角，早有蜻蜓立上头。","三餐烟火暖，四季自安然。","内心常清凉，何惧夏日长。","闲看天边云影，慢度朝夕流年。","绿树浓荫夏日长，心静自然生微凉。","偷得浮生半日闲，人间有味是清欢。","晚风拂暑意，愁绪自消散。","凡事平常心，处处皆风景。","荷风送香气，竹露滴清响。","岁月浅浅前行，余生慢慢度日。","不慌亦不忙，静待慢慢成长。","一隅清幽静，足以慰风尘。","晴时有风阴有雨，得失从容平常心。","褪去心头浮躁，归于平和安然。","初夏明朗时节，万事向阳舒展。","惜取眼前光景，莫忧来日漫长。","心静自然凉，安然度寻常。","晚风入襟怀，万事皆释怀。","时光缓缓流淌，喜乐淡淡平常。","夏木遇清风，心安有归处。","世事浮沉起落，平常心自渡之。","一院清风闲坐，半日悠然自在。","初夏光景明朗，万事向阳而行。","放下心头烦扰，日日皆是良辰。","荷风缓缓渐起，俗世烦忧尽息。","仲夏将至时节，度日自在从容。"],
        // 六月（30句）
        ["荷风徐徐而至，六月心绪安恬。","接天莲叶无穷碧，映日荷花别样红。","心底藏清风，盛夏暑气消。","蝉鸣声声入夏，静守内心清宁。","一池荷塘幽韵，偷享半日清闲。","清风徐来，水波不兴。","闲赏荷塘景致，消解尘世匆忙。","人间六月长夏，清净安然度日。","遇事常怀平常心，烦忧自然远离身。","荷香漫小院，心绪自悠然。","阴晴随意，得失随缘自安。","心中若无烦忧事，日日皆是好晴天。","晚风消酷暑，静坐享清宁。","采菊东篱下，悠然见南山。","平淡寻常日子，自有诗意藏其间。","蝉声阵阵喧闹，守住内心安然。","看淡世间纷扰，独守一隅清欢。","半窗疏影荷风，一寸心底安宁。","万般心头浮躁，静下心皆消散。","仲夏岁月悠长，慢慢体味寻常。","清风渡过荷塘，抚平内心慌张。","人间浮沉起落，一笑便可释然。","小坐庭前纳凉，闲散消磨时光。","世事短如春梦，人情薄似秋云。","荷风善解人意，诸事从容顺遂。","放下执念牵绊，一身轻快自在。","暮色温柔晚风，抚平满心忧愁。","静心观世间万物，平淡安稳度朝夕。","盛夏行至过半，心绪安稳平和。","六月圆满收尾，往后万事顺遂。"],

        // 八月（31句）
        ["晚风漫入八月，万事渐渐从容。","空山新雨后，天气晚来秋。","夏末微微凉意，心头琐事渐轻。","晚风消解烦忧，俗世杂念皆休。","岁月自然流转，万事顺其自然。","落霞与孤鹜齐飞，秋水共长天一色。","释怀过往遗憾，安然接纳今朝。","清风褪去暑气，内心归于平和。","半生风雨半生晴，一念放下一身轻。","落日万般温柔，抚平满心忧愁。","盛夏即将落幕，本心依旧如初。","万事不必强求，尽力便是圆满。","暮色温柔向晚，人间本就值得。","夕阳无限好，只是近黄昏。","慢品傍晚晚风，静享剩余盛夏。","向内安顿本心，待人处世温柔。","夏末清宁安稳，得失看淡随缘。","晚风缓缓漫卷，心事慢慢释然。","停止精神内耗，安稳从容度日。","落日归于山海，心事藏于尘埃。","过往尽数释然，当下岁岁安然。","随性自在度日，一生无忧无扰。","遇事沉住心气，万事自有从容。","知足便能常安乐，平淡安稳度流年。","生活宜简不宜繁，心事宜轻不宜重。","心怀平和坦荡，日日顺遂无忧。","落日余晖脉脉，治愈一身疲惫。","凡事尽心尽力做，无愧本心便足矣。","清空心头烦躁，静待秋日清风。","八月行将落幕，诸事顺心如意。","夏末安然收尾，来日自有可期。"],
        // 九月（30句）
        ["清秋缓缓启序，守住内心安宁。","空山秋气清，叶落见本心。","看淡世间纷扰，守住心头欢喜。","沉淀自身心性，稳步从容前行。","秋风扫尽烦忧，欢喜奔赴心头。","晴空一鹤排云上，便引诗情到碧霄。","生活适度松弛，不必时刻紧绷。","接纳所有遗憾，从容奔赴来日。","三餐烟火温暖，四季岁岁安然。","坚守本心所向，不随俗世浮沉。","遇事少些纠结，转身便是从容。","心怀一片晴朗，不惧秋日寒凉。","放下心中执念，一身自在轻松。","不必万众瞩目，自在即是高光。","清理心头杂念，日子清净简单。","平凡朝夕岁月，熬过自有回甘。","稳住自身情绪，前路万事顺畅。","凡事顺其自然，往往事半功倍。","拾取一缕秋风，收纳整日好心情。","少些怨怼多欢喜，日子自会温柔。","向内修养己身，向外温和处事。","不求满堂繁华，但求内心安稳。","琐碎寻常日常，藏尽细碎温柔。","凡事想得通透，愁绪自然消散。","步履缓缓前行，万事不必着急。","秋光满目温柔，人间万事无忧。","释怀过往种种，珍惜眼前当下。","知足安于当下，期许美好来日。","心静方能知秋，度日自在无忧。","九月安然落幕，岁岁清欢如常。"],
        // 十月（31句）

        // 十一月（30句）

    // 各月天数
    var MONTH_DAYS = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];

    // 获取今日句子
    function getDailyQuote() {
        var now = new Date();
        var month = now.getMonth(); // 0-11
        var day = now.getDate();    // 1-31

        var quotes = QUOTES[month];
        if (day <= quotes.length) {
            return quotes[day - 1];
        }

        // 2月29日或其他超出范围的情况：随机取一句
        var totalQuotes = 0;
        for (var i = 0; i < QUOTES.length; i++) {
            totalQuotes += QUOTES[i].length;
        }
        var randomIndex = Math.floor(Math.random() * totalQuotes);
        var count = 0;
        for (var j = 0; j < QUOTES.length; j++) {
            if (randomIndex < count + QUOTES[j].length) {
                return QUOTES[j][randomIndex - count];
            }
            count += QUOTES[j].length;
        }
        return QUOTES[0][0];
    }

    // 更新每日一句
    function updateQuote() {
        var quoteEl = document.getElementById("quote");
        quoteEl.textContent = getDailyQuote();
    }

        if (h >= 11 && h < 13) return "午时安好，记得歇息片刻";
        if (h >= 13 && h < 17) return "下午好，时光正温柔";
        if (h >= 17 && h < 19) return "傍晚好，暮色正温柔";
        if (h >= 19 && h < 22) return "夜晚安，愿你好梦";
        return "深夜静好，早些歇息";
    }

        var el = document.getElementById(digitIds[index]);
        el.querySelector(".card.top .flip-text").textContent = value;
        el.querySelector(".card.bottom .flip-text").textContent = value;
        currentDigits[index] = value;
    }

    function flipDigit(index, newValue) {
        if (isFlipping[index] || currentDigits[index] === newValue) return;
        isFlipping[index] = true;
        var el = document.getElementById(digitIds[index]);
        var oldValue = currentDigits[index];
        var topFlip = el.querySelector(".flip.top-flip");
        var bottomFlip = el.querySelector(".flip.bottom-flip");
        topFlip.querySelector(".flip-text").textContent = oldValue;
        bottomFlip.querySelector(".flip-text").textContent = newValue;
        topFlip.classList.add("animating");
        setTimeout(function() {
            el.querySelector(".card.top .flip-text").textContent = newValue;
            bottomFlip.classList.add("animating");
        }, FLIP_DURATION);
        setTimeout(function() {
            el.querySelector(".card.bottom .flip-text").textContent = newValue;
            topFlip.classList.remove("animating");
            bottomFlip.classList.remove("animating");
            currentDigits[index] = newValue;
            isFlipping[index] = false;
        }, FLIP_DURATION * 2 + 50);
    }

    function updateClock() {
        var now = new Date();
        var h = now.getHours(), m = now.getMinutes();
        var digits = [Math.floor(h/10), h%10, Math.floor(m/10), m%10];
        for (var i = 0; i < 4; i++) {
            if (currentDigits[i] === -1) setDigit(i, digits[i]);
            else if (currentDigits[i] !== digits[i] && !isFlipping[i]) flipDigit(i, digits[i]);
        }
        updateDate(now);
    }

    function updateDate(now) {
        document.getElementById("date").textContent =
            now.getFullYear() + "年" + (now.getMonth()+1) + "月" + now.getDate() + "日 " + WEEKDAYS[now.getDay()];
    }

    // ===== 天气功能 =====
    var weatherEl = document.getElementById("weather");
    var weatherIcon = document.getElementById("weather-icon");
    var weatherTemp = document.getElementById("weather-temp");
    var weatherDesc = document.getElementById("weather-desc");
    var weatherExtra = document.getElementById("weather-extra");
    var weatherGreeting = document.getElementById("weather-greeting");
    var weatherHasData = false;

    function fetchWeather() {
        weatherEl.className = "loading";
        fetchLocalWeather();
    }

    function fetchLocalWeather() {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", LOCAL_WEATHER_URL + "?t=" + Date.now(), true);
        xhr.timeout = 8000;
        xhr.onreadystatechange = function() {
            if (xhr.readyState !== 4) return;
            if (xhr.status === 200 && xhr.responseText) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    var age = Date.now() - (data.timestamp || 0);
                    if (age < MAX_WEATHER_AGE) { displayWeatherOpenMeteo(data); return; }
                    else if (age < MAX_WEATHER_DISPLAY_AGE) { displayWeatherOpenMeteo(data); tryFetchExternal(0); return; }
                } catch (e) {}
            }
            tryFetchExternal(0);
        };
        xhr.ontimeout = function() { tryFetchExternal(0); };
        xhr.onerror = function() { tryFetchExternal(0); };
        try { xhr.send(); } catch (e) { tryFetchExternal(0); }
    }

    function tryFetchExternal(sourceIndex) {
        if (sourceIndex >= WEATHER_SOURCES.length) { showWeatherError(); return; }
        var source = WEATHER_SOURCES[sourceIndex];
        var xhr = new XMLHttpRequest();
        xhr.open("GET", source.url, true);
        xhr.timeout = 10000;
        xhr.onreadystatechange = function() {
            if (xhr.readyState !== 4) return;
            if (xhr.status === 200 && xhr.responseText) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    if (source.type === "open-meteo") displayWeatherOpenMeteo(data);
                    else displayWeatherWttr(data);
                    return;
                } catch (e) {}
            }
            tryFetchExternal(sourceIndex + 1);
        };
        xhr.ontimeout = function() { tryFetchExternal(sourceIndex + 1); };
        xhr.onerror = function() { tryFetchExternal(sourceIndex + 1); };
        try { xhr.send(); } catch (e) { tryFetchExternal(sourceIndex + 1); }
    }

    function displayWeatherOpenMeteo(data) {
        var current = data.current;
        if (!current) { showWeatherError(); return; }
        var wmo = WMO_CODES[current.weather_code] || {desc:"未知",icon:"❓"};
        var temp = Math.round(current.temperature_2m);
        var feelsLike = Math.round(current.apparent_temperature);
        var humidity = current.relative_humidity_2m;
        var windSpeed = Math.round(current.wind_speed_10m);
        var windDir = windDirToText(current.wind_direction_10m);
        weatherEl.className = "";
        weatherHasData = true;
        weatherIcon.textContent = wmo.icon;
        weatherTemp.textContent = temp + "°";
        weatherDesc.textContent = wmo.desc;
        weatherExtra.innerHTML = "体感 " + feelsLike + "°<span class=\"weather-sep\">|</span>湿度 " + humidity + "%<span class=\"weather-sep\">|</span>" + windDir + " " + windSpeed + "km/h";
    }

    function displayWeatherWttr(data) {
        var current = data.current_condition;
        if (!current || !current[0]) { showWeatherError(); return; }
        var c = current[0];
        var temp = parseInt(c.temp_C, 10) || 0;
        var feelsLike = parseInt(c.FeelsLikeC, 10) || temp;
        var humidity = parseInt(c.humidity, 10) || 0;
        var windSpeed = parseInt(c.windspeedKmph, 10) || 0;
        var windDir = windDirToText(parseInt(c.winddirDegree, 10) || 0);
        var descEn = (c.weatherDesc && c.weatherDesc[0]) ? (c.weatherDesc[0].value || "") : "";
        var wmo = wttrToWmo(descEn);
        weatherEl.className = "";
        weatherHasData = true;
        weatherIcon.textContent = wmo.icon;
        weatherTemp.textContent = temp + "°";
        weatherDesc.textContent = wmo.desc;
        weatherExtra.innerHTML = "体感 " + feelsLike + "°<span class=\"weather-sep\">|</span>湿度 " + humidity + "%<span class=\"weather-sep\">|</span>" + windDir + " " + windSpeed + "km/h";
    }

    function wttrToWmo(desc) {
        var d = desc.toLowerCase();
        if (d.indexOf("sunny") >= 0 || d.indexOf("clear") >= 0) return {desc:"晴",icon:"☀️"};
        if (d.indexOf("partly") >= 0) return {desc:"晴间多云",icon:"🌤️"};
        if (d.indexOf("cloud") >= 0 || d.indexOf("overcast") >= 0) return {desc:"阴",icon:"☁️"};
        if (d.indexOf("mist") >= 0 || d.indexOf("fog") >= 0 || d.indexOf("haze") >= 0) return {desc:"雾",icon:"🌫️"};
        if (d.indexOf("rain") >= 0) return {desc:"雨",icon:"🌧️"};
        if (d.indexOf("drizzle") >= 0) return {desc:"毛毛雨",icon:"🌦️"};
        if (d.indexOf("snow") >= 0) return {desc:"雪",icon:"🌨️"};
        if (d.indexOf("thunder") >= 0 || d.indexOf("storm") >= 0) return {desc:"雷暴",icon:"⛈️"};
        return {desc:desc,icon:"🌡️"};
    }

    function showWeatherError() {
        if (weatherHasData) { weatherEl.className = ""; return; }
        // 没有天气数据时，显示时段问候语
        weatherEl.className = "error";
        weatherGreeting.textContent = getTimeGreeting();
        setTimeout(function() { fetchWeather(); }, 60000);
    }

    // ===== 启动 =====
    function init() {
        for (var i = 0; i < 4; i++) initDigit(i);
        updateClock();
        updateQuote();
        var now = new Date();
        var msToNextSecond = 1000 - now.getMilliseconds();
        setTimeout(function() {
            updateClock();
            setInterval(updateClock, 1000);
        }, msToNextSecond);
        // 每分钟更新一次问候语（天气不可用时）
        setInterval(function() {
            if (weatherEl.className === "error") {
                weatherGreeting.textContent = getTimeGreeting();
            }
        }, 60000);
        fetchWeather();
        setInterval(fetchWeather, WEATHER_UPDATE_INTERVAL);
        // 每小时检查一次是否需要更新每日一句（跨午夜）
        setInterval(updateQuote, 60 * 60 * 1000);
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }
})();
</script>
</body>
</html>
