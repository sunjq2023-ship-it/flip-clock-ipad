<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="format-detection" content="telephone=no">
<title>翻页时钟</title>
<style>
/* ===== 全局重置 ===== */
* {
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
    -webkit-user-select: none;
    user-select: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    /* 径向渐变背景：中心微亮，边缘纯黑，增加空间纵深感 */
    background: -webkit-radial-gradient(center, ellipse, #1a1a1a 0%, #0a0a0a 50%, #000 100%);
    background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 50%, #000 100%);
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

/* ===== 主容器 ===== */
#app {
    width: 100%;
    height: 100%;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-box-pack: center;
    -webkit-box-align: center;
    display: -webkit-flex;
    -webkit-flex-direction: column;
    -webkit-justify-content: center;
    -webkit-align-items: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* ===== 时钟区域 ===== */
#clock {
    display: -webkit-box;
    -webkit-box-orient: horizontal;
    -webkit-box-pack: center;
    -webkit-box-align: center;
    display: -webkit-flex;
    -webkit-justify-content: center;
    -webkit-align-items: center;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== 翻页数字单元 ===== */
.digit {
    position: relative;
    width: 150px;
    height: 225px;
    margin: 0 7px;
    font-size: 180px;
    font-weight: bold;
    line-height: 225px;
    -webkit-perspective: 600px;
    perspective: 600px;
}

/* 静态卡片（上下两半） - 增强材质质感 */
.card {
    position: absolute;
    left: 0;
    width: 100%;
    height: 50%;
    overflow: hidden;
    /* 更丰富的渐变：顶部高光 -> 中间 -> 底部暗 */
    background: #1a1a1a;
    background: -webkit-gradient(linear, left top, left bottom, from(#2a2a2a), to(#1a1a1a));
    background: -webkit-linear-gradient(top, #2a2a2a 0%, #222 40%, #1a1a1a 100%);
    background: linear-gradient(to bottom, #2a2a2a 0%, #222 40%, #1a1a1a 100%);
    -webkit-box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -2px 8px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -2px 8px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
}

/* 上半卡片：底部加翻轴暗线 */
.card.top {
    top: 0;
    -webkit-border-top-left-radius: 14px;
    -webkit-border-top-right-radius: 14px;
    border-top-left-radius: 14px;
    border-top-right-radius: 14px;
    /* 关键：中间分缝效果 - 底部暗线模拟翻轴缝隙 */
    border-bottom: 2px solid #000;
    -webkit-box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), inset 0 -4px 12px rgba(0,0,0,0.7), 0 4px 12px rgba(0,0,0,0.4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), inset 0 -4px 12px rgba(0,0,0,0.7), 0 4px 12px rgba(0,0,0,0.4);
}

/* 下半卡片：顶部加翻轴暗线 */
.card.bottom {
    bottom: 0;
    -webkit-border-bottom-left-radius: 14px;
    -webkit-border-bottom-right-radius: 14px;
    border-bottom-left-radius: 14px;
    border-bottom-right-radius: 14px;
    /* 关键：中间分缝效果 - 顶部暗线模拟翻轴缝隙 */
    border-top: 2px solid #000;
    -webkit-box-shadow: inset 0 -1px 0 rgba(255,255,255,0.05), inset 0 4px 12px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.4);
    box-shadow: inset 0 -1px 0 rgba(255,255,255,0.05), inset 0 4px 12px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.4);
}

/* 数字文本定位 - 暖白色 */
.card .flip-text {
    position: absolute;
    left: 0;
    width: 100%;
    height: 225px;
    line-height: 225px;
    text-align: center;
    color: #f5f0e8; /* 暖白色，更有温度 */
    text-shadow: 0 1px 3px rgba(0,0,0,0.5), 0 0 1px rgba(255,255,255,0.1);
}

.card.top .flip-text {
    top: 0;
}

.card.bottom .flip-text {
    top: -112px;
}

/* ===== 翻转动画卡片 - 同样增强质感 ===== */
.flip {
    position: absolute;
    left: 0;
    width: 100%;
    height: 50%;
    overflow: hidden;
    background: #1a1a1a;
    background: -webkit-gradient(linear, left top, left bottom, from(#2a2a2a), to(#1a1a1a));
    background: -webkit-linear-gradient(top, #2a2a2a 0%, #222 40%, #1a1a1a 100%);
    background: linear-gradient(to bottom, #2a2a2a 0%, #222 40%, #1a1a1a 100%);
    -webkit-box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -2px 8px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -2px 8px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    display: none;
    z-index: 10;
}

.flip .flip-text {
    position: absolute;
    left: 0;
    width: 100%;
    height: 225px;
    line-height: 225px;
    text-align: center;
    color: #f5f0e8;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5), 0 0 1px rgba(255,255,255,0.1);
}

/* 上半翻转 */
.flip.top-flip {
    top: 0;
    -webkit-border-top-left-radius: 14px;
    -webkit-border-top-right-radius: 14px;
    border-top-left-radius: 14px;
    border-top-right-radius: 14px;
    border-bottom: 2px solid #000;
    -webkit-transform-origin: bottom;
    transform-origin: bottom;
    -webkit-transform: rotateX(0deg);
    transform: rotateX(0deg);
}

.flip.top-flip .flip-text {
    top: 0;
}

.flip.top-flip.animating {
    display: block;
    -webkit-animation: flipTopDown 0.3s ease-in forwards;
    animation: flipTopDown 0.3s ease-in forwards;
}

@-webkit-keyframes flipTopDown {
    0% { -webkit-transform: rotateX(0deg); }
    100% { -webkit-transform: rotateX(-90deg); }
}

@keyframes flipTopDown {
    0% { transform: rotateX(0deg); }
    100% { transform: rotateX(-90deg); }
}

/* 下半翻转 */
.flip.bottom-flip {
    bottom: 0;
    -webkit-border-bottom-left-radius: 14px;
    -webkit-border-bottom-right-radius: 14px;
    border-bottom-left-radius: 14px;
    border-bottom-right-radius: 14px;
    border-top: 2px solid #000;
    -webkit-transform-origin: top;
    transform-origin: top;
    -webkit-transform: rotateX(90deg);
    transform: rotateX(90deg);
}

.flip.bottom-flip .flip-text {
    top: -112px;
}

.flip.bottom-flip.animating {
    display: block;
    -webkit-animation: flipBottomUp 0.3s ease-out forwards;
    animation: flipBottomUp 0.3s ease-out forwards;
}

@-webkit-keyframes flipBottomUp {
    0% { -webkit-transform: rotateX(90deg); }
    100% { -webkit-transform: rotateX(0deg); }
}

@keyframes flipBottomUp {
    0% { transform: rotateX(90deg); }
    100% { transform: rotateX(0deg); }
}

/* ===== 冒号 ===== */
.colon {
    font-size: 150px;
    font-weight: bold;
    color: #f5f0e8;
    line-height: 225px;
    padding: 0 12px;
    -webkit-animation: blink 2s ease-in-out infinite;
    animation: blink 2s ease-in-out infinite;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

@-webkit-keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
}

/* ===== 日期 ===== */
#date {
    margin-top: 50px;
    font-size: 36px;
    color: #888;
    text-align: center;
    letter-spacing: 3px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

/* ===== 天气区域 ===== */
#weather {
    margin-top: 35px;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-box-pack: center;
    -webkit-box-align: center;
    display: -webkit-flex;
    -webkit-flex-direction: column;
    -webkit-justify-content: center;
    -webkit-align-items: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 80px;
}

#weather.loading {
    opacity: 0.5;
}

#weather.error #weather-main,
#weather.error #weather-details {
    display: none;
}

#weather.error #weather-error-text {
    display: block;
}

#weather-error-text {
    display: none;
    color: #666;
    font-size: 24px;
}

/* 天气主信息行：图标 + 温度 + 描述 */
#weather-main {
    display: -webkit-box;
    -webkit-box-orient: horizontal;
    -webkit-box-align: center;
    display: -webkit-flex;
    -webkit-align-items: center;
    display: flex;
    align-items: center;
    margin-bottom: 12px;
}

#weather-icon {
    font-size: 72px;
    margin-right: 22px;
    line-height: 1;
}

#weather-temp {
    font-size: 54px;
    font-weight: 300;
    color: #f5f0e8;
    margin-right: 22px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}

#weather-desc {
    font-size: 30px;
    color: #bbb;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

/* 天气次信息行：体感/湿度/风 */
#weather-details {
    display: -webkit-box;
    -webkit-box-orient: horizontal;
    -webkit-box-align: center;
    -webkit-box-pack: center;
    display: -webkit-flex;
    -webkit-align-items: center;
    -webkit-justify-content: center;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: #666;
    letter-spacing: 1px;
}

.weather-sep {
    color: #333;
    margin: 0 14px;
}



/* ===== 响应式适配 ===== */
@media screen and (max-width: 768px) {
    .digit {
        width: 112px;
        height: 168px;
        font-size: 134px;
        line-height: 168px;
        margin: 0 4px;
    }
    .card .flip-text,
    .flip .flip-text {
        height: 168px;
        line-height: 168px;
        font-size: 134px;
    }
    .card.bottom .flip-text,
    .flip.bottom-flip .flip-text {
        top: -84px;
    }
    .colon {
        font-size: 112px;
        line-height: 168px;
        padding: 0 7px;
    }
    #date {
        font-size: 27px;
        margin-top: 35px;
    }
    #weather-icon {
        font-size: 54px;
    }
    #weather-temp {
        font-size: 42px;
    }
    #weather-desc {
        font-size: 24px;
    }
    #weather-details {
        font-size: 18px;
    }
}

@media screen and (max-width: 480px) {
    .digit {
        width: 82px;
        height: 123px;
        font-size: 98px;
        line-height: 123px;
        margin: 0 3px;
    }
    .card .flip-text,
    .flip .flip-text {
        height: 123px;
        line-height: 123px;
        font-size: 98px;
    }
    .card.bottom .flip-text,
    .flip.bottom-flip .flip-text {
        top: -61px;
    }
    .colon {
        font-size: 82px;
        line-height: 123px;
        padding: 0 4px;
    }
    #date {
        font-size: 20px;
        margin-top: 28px;
    }
    #weather-icon {
        font-size: 40px;
    }
    #weather-temp {
        font-size: 32px;
    }
    #weather-desc {
        font-size: 20px;
    }
    #weather-details {
        font-size: 15px;
    }
}
</style>
</head>
<body>

<div id="app">
    <div id="clock">
        <div class="digit" id="d0"></div>
        <div class="digit" id="d1"></div>
        <div class="colon">:</div>
        <div class="digit" id="d2"></div>
        <div class="digit" id="d3"></div>
    </div>
    <div id="date"></div>
    <div id="weather">
        <div id="weather-main">
            <div id="weather-icon"></div>
            <span id="weather-temp"></span>
            <span id="weather-desc"></span>
        </div>
        <div id="weather-details">
            <span id="weather-extra"></span>
        </div>
        <span id="weather-error-text">天气暂时不可用</span>
    </div>
</div>

<script>
(function() {
    "use strict";

    // ===== 配置 =====
    var LOCAL_WEATHER_URL = "weather.json";
    var WEATHER_SOURCES = [
        {
            url: "https://api.open-meteo.com/v1/forecast?latitude=31.23&longitude=121.47&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m&timezone=Asia/Shanghai",
            type: "open-meteo"
        },
        {
            url: "https://wttr.in/Shanghai?format=j1",
            type: "wttr"
        }
    ];
    var WEATHER_UPDATE_INTERVAL = 5 * 60 * 1000; // 5 分钟检查一次本地天气文件
    var FLIP_DURATION = 300; // 翻页动画时长（毫秒）
    var MAX_WEATHER_AGE = 2 * 60 * 60 * 1000; // 数据新鲜期：2小时内显示"新鲜"
    var MAX_WEATHER_DISPLAY_AGE = 24 * 60 * 60 * 1000; // 超过2小时但24小时内仍显示（标记为可能过时）

    // ===== WMO 天气代码映射 =====
    var WMO_CODES = {
        0:  { desc: "晴",     icon: "☀️" },
        1:  { desc: "晴",     icon: "🌤️" },
        2:  { desc: "多云",   icon: "⛅" },
        3:  { desc: "阴",     icon: "☁️" },
        45: { desc: "雾",     icon: "🌫️" },
        48: { desc: "雾凇",   icon: "🌫️" },
        51: { desc: "小毛毛雨", icon: "🌦️" },
        53: { desc: "毛毛雨", icon: "🌦️" },
        55: { desc: "大毛毛雨", icon: "🌧️" },
        56: { desc: "冻毛毛雨", icon: "🌧️" },
        57: { desc: "冻雨",   icon: "🌧️" },
        61: { desc: "小雨",   icon: "🌧️" },
        63: { desc: "中雨",   icon: "🌧️" },
        65: { desc: "大雨",   icon: "🌧️" },
        66: { desc: "冻雨",   icon: "🌧️" },
        67: { desc: "大冻雨", icon: "🌧️" },
        71: { desc: "小雪",   icon: "🌨️" },
        73: { desc: "中雪",   icon: "🌨️" },
        75: { desc: "大雪",   icon: "❄️" },
        77: { desc: "米雪",   icon: "🌨️" },
        80: { desc: "小阵雨", icon: "🌦️" },
        81: { desc: "阵雨",   icon: "🌧️" },
        82: { desc: "大阵雨", icon: "⛈️" },
        85: { desc: "小阵雪", icon: "🌨️" },
        86: { desc: "大阵雪", icon: "❄️" },
        95: { desc: "雷暴",   icon: "⛈️" },
        96: { desc: "雷暴冰雹", icon: "⛈️" },
        99: { desc: "大雷暴", icon: "⛈️" }
    };

    function windDirToText(deg) {
        var dirs = ["北", "东北", "东", "东南", "南", "西南", "西", "西北"];
        var idx = Math.round(deg / 45) % 8;
        return dirs[idx] + "风";
    }

    var WEEKDAYS = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];

    // ===== 翻页时钟核心 =====
    var currentDigits = [-1, -1, -1, -1];
    var digitIds = ["d0", "d1", "d2", "d3"];
    var isFlipping = [false, false, false, false];

    function initDigit(index) {
        var el = document.getElementById(digitIds[index]);
        el.innerHTML =
            '<div class="card top"><span class="flip-text">0</span></div>' +
            '<div class="card bottom"><span class="flip-text">0</span></div>' +
            '<div class="flip top-flip"><span class="flip-text">0</span></div>' +
            '<div class="flip bottom-flip"><span class="flip-text">0</span></div>';
    }

    function setDigit(index, value) {
        var el = document.getElementById(digitIds[index]);
        var topCard = el.querySelector(".card.top .flip-text");
        var bottomCard = el.querySelector(".card.bottom .flip-text");
        topCard.textContent = value;
        bottomCard.textContent = value;
        currentDigits[index] = value;
    }

    function flipDigit(index, newValue) {
        if (isFlipping[index]) return;
        if (currentDigits[index] === newValue) return;

        isFlipping[index] = true;
        var el = document.getElementById(digitIds[index]);
        var oldValue = currentDigits[index];

        var topFlip = el.querySelector(".flip.top-flip");
        var bottomFlip = el.querySelector(".flip.bottom-flip");
        var topFlipText = topFlip.querySelector(".flip-text");
        var bottomFlipText = bottomFlip.querySelector(".flip-text");
        var topCardText = el.querySelector(".card.top .flip-text");
        var bottomCardText = el.querySelector(".card.bottom .flip-text");

        topFlipText.textContent = oldValue;
        bottomFlipText.textContent = newValue;

        topFlip.classList.add("animating");

        setTimeout(function() {
            topCardText.textContent = newValue;
            bottomFlip.classList.add("animating");
        }, FLIP_DURATION);

        setTimeout(function() {
            bottomCardText.textContent = newValue;
            topFlip.classList.remove("animating");
            bottomFlip.classList.remove("animating");
            currentDigits[index] = newValue;
            isFlipping[index] = false;
        }, FLIP_DURATION * 2 + 50);
    }

    function updateClock() {
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();

        var digits = [
            Math.floor(h / 10),
            h % 10,
            Math.floor(m / 10),
            m % 10
        ];

        for (var i = 0; i < 4; i++) {
            if (currentDigits[i] === -1) {
                setDigit(i, digits[i]);
            } else if (currentDigits[i] !== digits[i] && !isFlipping[i]) {
                flipDigit(i, digits[i]);
            }
        }

        updateDate(now);
    }

    function updateDate(now) {
        var dateEl = document.getElementById("date");
        var y = now.getFullYear();
        var mo = now.getMonth() + 1;
        var d = now.getDate();
        var w = WEEKDAYS[now.getDay()];
        dateEl.textContent = y + "年" + mo + "月" + d + "日 " + w;
    }

    // ===== 天气功能 =====
    var weatherEl = document.getElementById("weather");
    var weatherIcon = document.getElementById("weather-icon");
    var weatherTemp = document.getElementById("weather-temp");
    var weatherDesc = document.getElementById("weather-desc");
    var weatherExtra = document.getElementById("weather-extra");
    var weatherHasData = false; // 是否已有天气数据在显示

    function fetchWeather() {
        weatherEl.className = "loading";
        fetchLocalWeather();
    }

    function fetchLocalWeather() {
        var xhr = new XMLHttpRequest();
        var url = LOCAL_WEATHER_URL + "?t=" + Date.now();
        xhr.open("GET", url, true);
        xhr.timeout = 8000;

        xhr.onreadystatechange = function() {
            if (xhr.readyState !== 4) return;

            if (xhr.status === 200 && xhr.responseText) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    var dataTime = data.timestamp || 0;
                    var age = Date.now() - dataTime;
                    if (age < MAX_WEATHER_AGE) {
                        // 数据新鲜，直接显示
                        displayWeatherOpenMeteo(data);
                        return;
                    } else if (age < MAX_WEATHER_DISPLAY_AGE) {
                        // 数据过期但仍在可接受范围（24小时内），仍然显示
                        // 同时静默尝试外部 API 更新
                        displayWeatherOpenMeteo(data);
                        tryFetchExternal(0);
                        return;
                    }
                    // 超过24小时，数据太旧，尝试外部 API
                } catch (e) {
                }
            }
            // 本地文件不可用，尝试外部 API
            tryFetchExternal(0);
        };

        xhr.ontimeout = function() {
            tryFetchExternal(0);
        };

        xhr.onerror = function() {
            tryFetchExternal(0);
        };

        try {
            xhr.send();
        } catch (e) {
            tryFetchExternal(0);
        }
    }

    function tryFetchExternal(sourceIndex) {
        if (sourceIndex >= WEATHER_SOURCES.length) {
            showWeatherError();
            return;
        }

        var source = WEATHER_SOURCES[sourceIndex];
        var xhr = new XMLHttpRequest();
        xhr.open("GET", source.url, true);
        xhr.timeout = 10000;

        xhr.onreadystatechange = function() {
            if (xhr.readyState !== 4) return;

            if (xhr.status === 200 && xhr.responseText) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    if (source.type === "open-meteo") {
                        displayWeatherOpenMeteo(data);
                    } else {
                        displayWeatherWttr(data);
                    }
                    return;
                } catch (e) {
                }
            }
            tryFetchExternal(sourceIndex + 1);
        };

        xhr.ontimeout = function() {
            tryFetchExternal(sourceIndex + 1);
        };

        xhr.onerror = function() {
            tryFetchExternal(sourceIndex + 1);
        };

        try {
            xhr.send();
        } catch (e) {
            tryFetchExternal(sourceIndex + 1);
        }
    }

    function displayWeatherOpenMeteo(data) {
        var current = data.current;
        if (!current) {
            showWeatherError();
            return;
        }

        var code = current.weather_code;
        var wmo = WMO_CODES[code] || { desc: "未知", icon: "❓" };

        var temp = Math.round(current.temperature_2m);
        var feelsLike = Math.round(current.apparent_temperature);
        var humidity = current.relative_humidity_2m;
        var windSpeed = Math.round(current.wind_speed_10m);
        var windDir = windDirToText(current.wind_direction_10m);

        weatherEl.className = "";
        weatherHasData = true;
        weatherIcon.textContent = wmo.icon;
        weatherTemp.textContent = temp + "°";
        weatherDesc.textContent = wmo.desc;
        weatherExtra.innerHTML =
            "体感 " + feelsLike + "°" +
            '<span class="weather-sep">|</span>' +
            "湿度 " + humidity + "%" +
            '<span class="weather-sep">|</span>' +
            windDir + " " + windSpeed + "km/h";
    }

    // 显示 wttr.in 格式的天气
    function displayWeatherWttr(data) {
        var current = data.current_condition;
        if (!current || !current[0]) {
            showWeatherError();
            return;
        }

        var c = current[0];
        var temp = parseInt(c.temp_C, 10) || 0;
        var feelsLike = parseInt(c.FeelsLikeC, 10) || temp;
        var humidity = parseInt(c.humidity, 10) || 0;
        var windSpeed = parseInt(c.windspeedKmph, 10) || 0;
        var windDirDeg = parseInt(c.winddirDegree, 10) || 0;
        var windDir = windDirToText(windDirDeg);

        var descEn = "";
        if (c.weatherDesc && c.weatherDesc[0]) {
            descEn = c.weatherDesc[0].value || "";
        }
        var wmo = wttrToWmo(descEn, temp);

        weatherEl.className = "";
        weatherHasData = true;
        weatherIcon.textContent = wmo.icon;
        weatherTemp.textContent = temp + "°";
        weatherDesc.textContent = wmo.desc;
        weatherExtra.innerHTML =
            "体感 " + feelsLike + "°" +
            '<span class="weather-sep">|</span>' +
            "湿度 " + humidity + "%" +
            '<span class="weather-sep">|</span>' +
            windDir + " " + windSpeed + "km/h";
    }

    function wttrToWmo(desc, temp) {
        var d = desc.toLowerCase();
        if (d.indexOf("sunny") >= 0 || d.indexOf("clear") >= 0) return { desc: "晴", icon: "☀️" };
        if (d.indexOf("partly") >= 0) return { desc: "晴间多云", icon: "🌤️" };
        if (d.indexOf("cloud") >= 0 || d.indexOf("overcast") >= 0) return { desc: "阴", icon: "☁️" };
        if (d.indexOf("mist") >= 0 || d.indexOf("fog") >= 0 || d.indexOf("haze") >= 0) return { desc: "雾", icon: "🌫️" };
        if (d.indexOf("rain") >= 0) return { desc: "雨", icon: "🌧️" };
        if (d.indexOf("drizzle") >= 0) return { desc: "毛毛雨", icon: "🌦️" };
        if (d.indexOf("snow") >= 0) return { desc: "雪", icon: "🌨️" };
        if (d.indexOf("thunder") >= 0 || d.indexOf("storm") >= 0) return { desc: "雷暴", icon: "⛈️" };
        return { desc: desc, icon: "🌡️" };
    }

    function showWeatherError() {
        // 如果已有天气数据在显示，保持不变，不报错
        if (weatherHasData) {
            weatherEl.className = "";
            return;
        }

        weatherEl.className = "error";

        setTimeout(function() {
            fetchWeather();
        }, 60000);
    }

    // ===== 启动 =====
    function init() {
        for (var i = 0; i < 4; i++) {
            initDigit(i);
        }

        updateClock();

        var now = new Date();
        var msToNextSecond = 1000 - now.getMilliseconds();
        setTimeout(function() {
            updateClock();
            setInterval(updateClock, 1000);
        }, msToNextSecond);

        fetchWeather();
        setInterval(fetchWeather, WEATHER_UPDATE_INTERVAL);
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }
})();
</script>
</body>
</html>
