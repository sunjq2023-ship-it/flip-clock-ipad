<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="format-detection" content="telephone=no">
<title>翻页时钟</title>
<style>
/* ===== 全局重置 ===== */
* {
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
    -webkit-user-select: none;
    user-select: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

/* ===== 主容器 ===== */
#app {
    width: 100%;
    height: 100%;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-box-pack: center;
    -webkit-box-align: center;
    display: -webkit-flex;
    -webkit-flex-direction: column;
    -webkit-justify-content: center;
    -webkit-align-items: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* ===== 时钟区域 ===== */
#clock {
    display: -webkit-box;
    -webkit-box-orient: horizontal;
    -webkit-box-pack: center;
    -webkit-box-align: center;
    display: -webkit-flex;
    -webkit-justify-content: center;
    -webkit-align-items: center;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== 翻页数字单元 ===== */
.digit {
    position: relative;
    width: 100px;
    height: 150px;
    margin: 0 5px;
    font-size: 120px;
    font-weight: bold;
    line-height: 150px;
    -webkit-perspective: 500px;
    perspective: 500px;
}

/* 静态卡片（上下两半） */
.card {
    position: absolute;
    left: 0;
    width: 100%;
    height: 50%;
    overflow: hidden;
    background: #1a1a1a;
    background: -webkit-gradient(linear, left top, left bottom, from(#222), to(#1a1a1a));
    background: -webkit-linear-gradient(top, #222, #1a1a1a);
    background: linear-gradient(to bottom, #222, #1a1a1a);
    -webkit-box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
    box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
}

.card.top {
    top: 0;
    -webkit-border-top-left-radius: 12px;
    -webkit-border-top-right-radius: 12px;
    border-top-left-radius: 12px;
    border-top-right-radius: 12px;
    border-bottom: 1px solid #000;
}

.card.bottom {
    bottom: 0;
    -webkit-border-bottom-left-radius: 12px;
    -webkit-border-bottom-right-radius: 12px;
    border-bottom-left-radius: 12px;
    border-bottom-right-radius: 12px;
}

/* 数字文本定位 */
.card .flip-text {
    position: absolute;
    left: 0;
    width: 100%;
    height: 150px;
    line-height: 150px;
    text-align: center;
    color: #f0f0f0;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

.card.top .flip-text {
    top: 0;
}

.card.bottom .flip-text {
    top: -75px;
}

/* ===== 翻转动画卡片 ===== */
.flip {
    position: absolute;
    left: 0;
    width: 100%;
    height: 50%;
    overflow: hidden;
    background: #1a1a1a;
    background: -webkit-gradient(linear, left top, left bottom, from(#222), to(#1a1a1a));
    background: -webkit-linear-gradient(top, #222, #1a1a1a);
    background: linear-gradient(to bottom, #222, #1a1a1a);
    -webkit-box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
    box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    display: none;
    z-index: 10;
}

.flip .flip-text {
    position: absolute;
    left: 0;
    width: 100%;
    height: 150px;
    line-height: 150px;
    text-align: center;
    color: #f0f0f0;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

/* 上半翻转（旧数字上半部分，向下翻） */
.flip.top-flip {
    top: 0;
    -webkit-border-top-left-radius: 12px;
    -webkit-border-top-right-radius: 12px;
    border-top-left-radius: 12px;
    border-top-right-radius: 12px;
    border-bottom: 1px solid #000;
    -webkit-transform-origin: bottom;
    transform-origin: bottom;
    -webkit-transform: rotateX(0deg);
    transform: rotateX(0deg);
}

.flip.top-flip .flip-text {
    top: 0;
}

.flip.top-flip.animating {
    display: block;
    -webkit-animation: flipTopDown 0.3s ease-in forwards;
    animation: flipTopDown 0.3s ease-in forwards;
}

@-webkit-keyframes flipTopDown {
    0% { -webkit-transform: rotateX(0deg); }
    100% { -webkit-transform: rotateX(-90deg); }
}

@keyframes flipTopDown {
    0% { transform: rotateX(0deg); }
    100% { transform: rotateX(-90deg); }
}

/* 下半翻转（新数字下半部分，向上翻） */
.flip.bottom-flip {
    bottom: 0;
    -webkit-border-bottom-left-radius: 12px;
    -webkit-border-bottom-right-radius: 12px;
    border-bottom-left-radius: 12px;
    border-bottom-right-radius: 12px;
    -webkit-transform-origin: top;
    transform-origin: top;
    -webkit-transform: rotateX(90deg);
    transform: rotateX(90deg);
}

.flip.bottom-flip .flip-text {
    top: -75px;
}

.flip.bottom-flip.animating {
    display: block;
    -webkit-animation: flipBottomUp 0.3s ease-out forwards;
    animation: flipBottomUp 0.3s ease-out forwards;
}

@-webkit-keyframes flipBottomUp {
    0% { -webkit-transform: rotateX(90deg); }
    100% { -webkit-transform: rotateX(0deg); }
}

@keyframes flipBottomUp {
    0% { transform: rotateX(90deg); }
    100% { transform: rotateX(0deg); }
}

/* ===== 冒号 ===== */
.colon {
    font-size: 100px;
    font-weight: bold;
    color: #f0f0f0;
    line-height: 150px;
    padding: 0 8px;
    -webkit-animation: blink 2s ease-in-out infinite;
    animation: blink 2s ease-in-out infinite;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

@-webkit-keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

/* ===== 日期 ===== */
#date {
    margin-top: 35px;
    font-size: 24px;
    color: #888;
    text-align: center;
    letter-spacing: 2px;
}

/* ===== 天气区域 ===== */
#weather {
    margin-top: 25px;
    display: -webkit-box;
    -webkit-box-orient: horizontal;
    -webkit-box-pack: center;
    -webkit-box-align: center;
    display: -webkit-flex;
    -webkit-justify-content: center;
    -webkit-align-items: center;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60px;
}

#weather.loading {
    opacity: 0.5;
}

#weather.error #weather-content {
    color: #666;
    font-size: 16px;
}

#weather-icon {
    font-size: 48px;
    margin-right: 15px;
    line-height: 1;
}

#weather-content {
    display: -webkit-box;
    -webkit-box-orient: horizontal;
    -webkit-box-align: center;
    display: -webkit-flex;
    -webkit-align-items: center;
    display: flex;
    align-items: center;
    color: #ccc;
}

#weather-temp {
    font-size: 36px;
    font-weight: 300;
    color: #f0f0f0;
    margin-right: 15px;
}

#weather-desc {
    font-size: 20px;
    color: #aaa;
    margin-right: 15px;
}

#weather-extra {
    font-size: 16px;
    color: #777;
}

.weather-sep {
    color: #444;
    margin: 0 10px;
}

/* ===== 提示文字 ===== */
#hint {
    position: fixed;
    bottom: 15px;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 13px;
    color: #333;
}

/* ===== 响应式适配 ===== */
@media screen and (max-width: 768px) {
    .digit {
        width: 75px;
        height: 113px;
        font-size: 90px;
        line-height: 113px;
        margin: 0 3px;
    }
    .card .flip-text,
    .flip .flip-text {
        height: 113px;
        line-height: 113px;
        font-size: 90px;
    }
    .card.bottom .flip-text,
    .flip.bottom-flip .flip-text {
        top: -56px;
    }
    .colon {
        font-size: 75px;
        line-height: 113px;
        padding: 0 5px;
    }
    #date {
        font-size: 18px;
        margin-top: 25px;
    }
    #weather-icon {
        font-size: 36px;
    }
    #weather-temp {
        font-size: 28px;
    }
    #weather-desc {
        font-size: 16px;
    }
    #weather-extra {
        font-size: 14px;
    }
}

@media screen and (max-width: 480px) {
    .digit {
        width: 55px;
        height: 83px;
        font-size: 66px;
        line-height: 83px;
        margin: 0 2px;
    }
    .card .flip-text,
    .flip .flip-text {
        height: 83px;
        line-height: 83px;
        font-size: 66px;
    }
    .card.bottom .flip-text,
    .flip.bottom-flip .flip-text {
        top: -41px;
    }
    .colon {
        font-size: 55px;
        line-height: 83px;
        padding: 0 3px;
    }
    #date {
        font-size: 14px;
        margin-top: 20px;
    }
    #weather-icon {
        font-size: 28px;
    }
    #weather-temp {
        font-size: 22px;
    }
    #weather-desc {
        font-size: 14px;
    }
    #weather-extra {
        font-size: 12px;
    }
}
</style>
</head>
<body>

<div id="app">
    <div id="clock">
        <div class="digit" id="d0"></div>
        <div class="digit" id="d1"></div>
        <div class="colon">:</div>
        <div class="digit" id="d2"></div>
        <div class="digit" id="d3"></div>
    </div>
    <div id="date"></div>
    <div id="weather">
        <div id="weather-icon"></div>
        <div id="weather-content">
            <span id="weather-temp"></span>
            <span id="weather-desc"></span>
            <span id="weather-extra"></span>
        </div>
    </div>
</div>

<div id="hint">添加到主屏幕以全屏显示 · 建议关闭自动锁定</div>

<script>
(function() {
    "use strict";

    // ===== 配置 =====
    var WEATHER_API_URL = "https://api.open-meteo.com/v1/forecast?latitude=31.23&longitude=121.47&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m&timezone=Asia/Shanghai";
    var WEATHER_UPDATE_INTERVAL = 30 * 60 * 1000; // 30 分钟
    var FLIP_DURATION = 300; // 翻页动画时长（毫秒）

    // ===== WMO 天气代码映射 =====
    var WMO_CODES = {
        0:  { desc: "晴",     icon: "☀️" },
        1:  { desc: "晴",     icon: "🌤️" },
        2:  { desc: "多云",   icon: "⛅" },
        3:  { desc: "阴",     icon: "☁️" },
        45: { desc: "雾",     icon: "🌫️" },
        48: { desc: "雾凇",   icon: "🌫️" },
        51: { desc: "小毛毛雨", icon: "🌦️" },
        53: { desc: "毛毛雨", icon: "🌦️" },
        55: { desc: "大毛毛雨", icon: "🌧️" },
        56: { desc: "冻毛毛雨", icon: "🌧️" },
        57: { desc: "冻雨",   icon: "🌧️" },
        61: { desc: "小雨",   icon: "🌧️" },
        63: { desc: "中雨",   icon: "🌧️" },
        65: { desc: "大雨",   icon: "🌧️" },
        66: { desc: "冻雨",   icon: "🌧️" },
        67: { desc: "大冻雨", icon: "🌧️" },
        71: { desc: "小雪",   icon: "🌨️" },
        73: { desc: "中雪",   icon: "🌨️" },
        75: { desc: "大雪",   icon: "❄️" },
        77: { desc: "米雪",   icon: "🌨️" },
        80: { desc: "小阵雨", icon: "🌦️" },
        81: { desc: "阵雨",   icon: "🌧️" },
        82: { desc: "大阵雨", icon: "⛈️" },
        85: { desc: "小阵雪", icon: "🌨️" },
        86: { desc: "大阵雪", icon: "❄️" },
        95: { desc: "雷暴",   icon: "⛈️" },
        96: { desc: "雷暴冰雹", icon: "⛈️" },
        99: { desc: "大雷暴", icon: "⛈️" }
    };

    // ===== 风向映射 =====
    function windDirToText(deg) {
        var dirs = ["北", "东北", "东", "东南", "南", "西南", "西", "西北"];
        var idx = Math.round(deg / 45) % 8;
        return dirs[idx] + "风";
    }

    // ===== 星期映射 =====
    var WEEKDAYS = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];

    // ===== 翻页时钟核心 =====
    var currentDigits = [-1, -1, -1, -1];
    var digitIds = ["d0", "d1", "d2", "d3"];
    var isFlipping = [false, false, false, false];

    // 初始化数字单元的 DOM
    function initDigit(index) {
        var el = document.getElementById(digitIds[index]);
        el.innerHTML =
            '<div class="card top"><span class="flip-text">0</span></div>' +
            '<div class="card bottom"><span class="flip-text">0</span></div>' +
            '<div class="flip top-flip"><span class="flip-text">0</span></div>' +
            '<div class="flip bottom-flip"><span class="flip-text">0</span></div>';
    }

    // 设置数字（无动画，用于初始化）
    function setDigit(index, value) {
        var el = document.getElementById(digitIds[index]);
        var topCard = el.querySelector(".card.top .flip-text");
        var bottomCard = el.querySelector(".card.bottom .flip-text");
        topCard.textContent = value;
        bottomCard.textContent = value;
        currentDigits[index] = value;
    }

    // 翻页动画
    function flipDigit(index, newValue) {
        if (isFlipping[index]) return;
        if (currentDigits[index] === newValue) return;

        isFlipping[index] = true;
        var el = document.getElementById(digitIds[index]);
        var oldValue = currentDigits[index];

        var topFlip = el.querySelector(".flip.top-flip");
        var bottomFlip = el.querySelector(".flip.bottom-flip");
        var topFlipText = topFlip.querySelector(".flip-text");
        var bottomFlipText = bottomFlip.querySelector(".flip-text");
        var topCardText = el.querySelector(".card.top .flip-text");
        var bottomCardText = el.querySelector(".card.bottom .flip-text");

        // 设置翻转文本
        topFlipText.textContent = oldValue;
        bottomFlipText.textContent = newValue;

        // 开始上半部分翻转（旧数字上半部分向下翻）
        topFlip.classList.add("animating");

        // 上半翻转完成后
        setTimeout(function() {
            // 更新静态上半部分为新数字
            topCardText.textContent = newValue;
            // 开始下半部分翻转（新数字下半部分向上翻）
            bottomFlip.classList.add("animating");
        }, FLIP_DURATION);

        // 全部翻转完成后清理
        setTimeout(function() {
            // 更新静态下半部分为新数字
            bottomCardText.textContent = newValue;
            // 移除动画类
            topFlip.classList.remove("animating");
            bottomFlip.classList.remove("animating");
            // 更新当前值
            currentDigits[index] = newValue;
            isFlipping[index] = false;
        }, FLIP_DURATION * 2 + 50);
    }

    // 更新时钟
    function updateClock() {
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();

        var digits = [
            Math.floor(h / 10),
            h % 10,
            Math.floor(m / 10),
            m % 10
        ];

        for (var i = 0; i < 4; i++) {
            if (currentDigits[i] === -1) {
                setDigit(i, digits[i]);
            } else if (currentDigits[i] !== digits[i] && !isFlipping[i]) {
                flipDigit(i, digits[i]);
            }
        }

        // 更新日期
        updateDate(now);
    }

    // 更新日期
    function updateDate(now) {
        var dateEl = document.getElementById("date");
        var y = now.getFullYear();
        var mo = now.getMonth() + 1;
        var d = now.getDate();
        var w = WEEKDAYS[now.getDay()];
        dateEl.textContent = y + "年" + mo + "月" + d + "日 " + w;
    }

    // ===== 天气功能 =====
    var weatherEl = document.getElementById("weather");
    var weatherIcon = document.getElementById("weather-icon");
    var weatherTemp = document.getElementById("weather-temp");
    var weatherDesc = document.getElementById("weather-desc");
    var weatherExtra = document.getElementById("weather-extra");

    function fetchWeather() {
        weatherEl.className = "loading";

        var xhr = new XMLHttpRequest();
        xhr.open("GET", WEATHER_API_URL, true);
        xhr.timeout = 15000;

        xhr.onreadystatechange = function() {
            if (xhr.readyState !== 4) return;

            if (xhr.status === 200) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    displayWeather(data);
                } catch (e) {
                    showWeatherError();
                }
            } else {
                showWeatherError();
            }
        };

        xhr.ontimeout = function() {
            showWeatherError();
        };

        xhr.onerror = function() {
            showWeatherError();
        };

        xhr.send();
    }

    function displayWeather(data) {
        var current = data.current;
        if (!current) {
            showWeatherError();
            return;
        }

        var code = current.weather_code;
        var wmo = WMO_CODES[code] || { desc: "未知", icon: "❓" };

        var temp = Math.round(current.temperature_2m);
        var feelsLike = Math.round(current.apparent_temperature);
        var humidity = current.relative_humidity_2m;
        var windSpeed = Math.round(current.wind_speed_10m);
        var windDir = windDirToText(current.wind_direction_10m);

        weatherEl.className = "";
        weatherIcon.textContent = wmo.icon;
        weatherTemp.textContent = temp + "°";
        weatherDesc.textContent = wmo.desc;
        weatherExtra.innerHTML =
            "体感 " + feelsLike + "°" +
            '<span class="weather-sep">|</span>' +
            "湿度 " + humidity + "%" +
            '<span class="weather-sep">|</span>' +
            windDir + " " + windSpeed + "km/h";
    }

    function showWeatherError() {
        weatherEl.className = "error";
        weatherIcon.textContent = "";
        weatherTemp.textContent = "";
        weatherDesc.textContent = "天气获取失败，稍后重试";
        weatherExtra.textContent = "";

        // 5 秒后重试
        setTimeout(function() {
            fetchWeather();
        }, 5000);
    }

    // ===== 启动 =====
    function init() {
        // 初始化所有数字单元
        for (var i = 0; i < 4; i++) {
            initDigit(i);
        }

        // 立即显示当前时间
        updateClock();

        // 同步到下一秒边界
        var now = new Date();
        var msToNextSecond = 1000 - now.getMilliseconds();
        setTimeout(function() {
            updateClock();
            // 每秒检查一次
            setInterval(updateClock, 1000);
        }, msToNextSecond);

        // 获取天气
        fetchWeather();

        // 定期更新天气
        setInterval(fetchWeather, WEATHER_UPDATE_INTERVAL);
    }

    // DOM 就绪后启动
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }
})();
</script>
</body>
</html>
